services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dailygrind
      POSTGRES_PASSWORD: dailygrind
      POSTGRES_DB: dailygrind
    ports:
      - "5432:5432"
    volumes:
      - dg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailygrind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://dailygrind:dailygrind@db:5432/dailygrind?sslmode=disable
      JWT_SECRET: change-me-in-production-please-32chars
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  dg_pgdata:
